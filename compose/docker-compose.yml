services:
    artifact-server:
        image: ${NGINX_IMAGE}
        restart: unless-stopped
        ports:
            - "${ARTIFACT_SERVER_PORT}:80"
        volumes:
            - ./registry/artifacts:/usr/share/nginx/html/models:ro,Z
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://127.0.0.1/models/re-indicators-specification/${MODEL_VERSION}/schema.json",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    hex-core-service:
        build:
            context: ../../hex-core-service
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            artifact-server:
                condition: service_healthy
        ports:
            - "${HEX_CORE_PORT}:8080"
        environment:
            SERVER_HOST: ${HEX_CORE_SERVER_HOST}
            SERVER_PORT: ${HEX_CORE_SERVER_PORT}
            SERVER_REQUEST_MAX_BYTES: ${HEX_CORE_SERVER_REQUEST_MAX_BYTES}
            LOG_LEVEL: ${HEX_CORE_LOG_LEVEL}
            METRICS_ENABLED: ${HEX_CORE_METRICS_ENABLED}
            REGISTRY_MODE: ${REGISTRY_MODE}
            REGISTRY_CATALOG_FILE: ${REGISTRY_CATALOG_FILE}
            REGISTRY_ALLOWED_HOSTS: ${REGISTRY_ALLOWED_HOSTS}
            REGISTRY_REQUIRE_HTTPS: ${REGISTRY_REQUIRE_HTTPS}
            REGISTRY_CACHE_ENABLED: ${REGISTRY_CACHE_ENABLED}
            REGISTRY_CACHE_TTL_SECS: ${REGISTRY_CACHE_TTL_SECS}
            IO_ADAPTER_ID: ${IO_ADAPTER_ID}
            AUTH_MODE: ${AUTH_MODE}
            AUTH_ALLOW_INSECURE_NONE: ${AUTH_ALLOW_INSECURE_NONE}
            AUTH_NONE_SUBJECT: ${AUTH_NONE_SUBJECT}
            AUTH_NONE_ROLES: ${AUTH_NONE_ROLES}
            AUTH_NONE_SCOPES: ${AUTH_NONE_SCOPES}
        volumes:
            - ./registry/catalog.json:/config/registry/catalog.json:ro,Z
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://127.0.0.1:8080/admin/ready >/dev/null",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    re-indicators-calculation-service:
        build:
            context: ..
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            hex-core-service:
                condition: service_healthy
            artifact-server:
                condition: service_healthy
        ports:
            - "${RE_INDICATORS_CALCULATION_PORT}:8080"
        environment:
            BIND_ADDRESS: ${CALC_SERVER_HOST}
            PORT: ${CALC_SERVER_PORT}
            HEX_CORE_BASE_URL: http://hex-core-service:8080
            ARTIFACT_BASE_URL_TEMPLATE: http://artifact-server/models/re-indicators-specification/{version}/
            HTTP_TIMEOUT_SECS: ${CALC_HTTP_TIMEOUT_SECS}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://127.0.0.1:8080/health",
                ]
            interval: 5s
            timeout: 5s
            retries: 20
